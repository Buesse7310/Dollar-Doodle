<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dollar Doodle - Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

  <!-- Header with Logo -->
  <header class="dashboard-header">
    <div class="logo-wrapper">
      <a href="index.html">
        <img src="assets/images/logo-full.png" class="logo" alt="Dollar Doodle Logo">
      </a>
    </div>
  </header>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <div class="top-bar">
      <div id="welcome"></div>
      <button id="logoutBtn">Logout</button>
    </div>

    <div id="balance">Balance: $0</div>

    <!-- Add Transaction Button -->
    <button id="add-expense-btn">Add Transaction</button>

    <!-- Add Transaction Modal -->
    <div id="add-expense-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3>Add Transaction</h3>
        <form id="add-expense-form">

          <!-- Transaction Type -->
          <div id="type-wrapper">
            <select id="type" required>
              <option value="expense" selected>Expense</option>
              <option value="income">Income</option>
            </select>
          </div>

          <!-- Description (expenses only) -->
          <div id="description-wrapper">
            <input type="text" id="description" placeholder="Description" />
          </div>

          <!-- Amount (common) -->
          <div id="amount-wrapper">
            <input type="number" id="amount" placeholder="Amount" step="0.01" required />
          </div>

          <!-- Date (common) -->
          <div id="date-wrapper">
            <input type="date" id="date" required />
          </div>

          <!-- Expense-specific: category -->
          <div id="category-wrapper">
            <select id="category">
              <!-- Categories loaded dynamically -->
            </select>
          </div>

          <!-- Income-specific: source -->
          <div id="income-source-wrapper">
            <select id="income-source">
              <!-- Income sources loaded dynamically -->
            </select>
          </div>

          <!-- Income-specific: recurring -->
          <div id="income-repeating-wrapper">
            <label>
              <input type="checkbox" id="income-repeating" /> Recurring Income
            </label>
            <select id="income-frequency" disabled>
              <!-- Recurring frequencies loaded dynamically -->
            </select>
          </div>

          <button type="submit">Add</button>
        </form>
      </div>
    </div>

    <!-- Transactions List -->
    <h3>Transactions</h3>
    <ul id="transactions"></ul>

    <!-- Clear All Button -->
    <button id="clearBtn">Clear All</button>

    <p id="error" class="error"></p>
  </div>

  <script src="js/dashboard.js"></script>
</body>

</html>
