<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dollar Doodle - Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

  <!-- Header with Logo -->
  <header class="dashboard-header">
    <div class="logo-wrapper">
      <a href="index.html">
        <img src="assets/images/logo-full.png" class="logo" alt="Dollar Doodle Logo">
      </a>
    </div>
  </header>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <div class="top-bar">
      <div id="welcome"></div>
      <button id="logout-btn">Logout</button>
    </div>

    <div id="balance">Balance: $0</div>

    <!-- Add Transaction Button -->
    <button id="add-expense-btn">Add Transaction</button>

    <!-- Receipt Upload -->
    <button id="upload-receipt-btn">📷 Upload Receipt</button>
    <input type="file" id="receiptInput" accept="image/*,application/pdf" style="display: none;">

    <!-- Feedback Button (fixed) -->
    <button id="feedback-btn"
      style="position: fixed; bottom: 20px; left: 20px; background-color: #1B3A6C; color: white; padding: 10px 20px; border: none; border-radius: 50px; cursor: pointer;">
      💬 Send Feedback
    </button>

    <!-- Add Transaction Modal -->
    <div id="add-expense-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3>Add Transaction</h3>
        <form id="add-expense-form">

          <div id="type-wrapper">
            <select id="type" required>
              <option value="expense" selected>Expense</option>
              <option value="income">Income</option>
            </select>
          </div>

          <div id="description-wrapper">
            <input type="text" id="description" placeholder="Description" />
          </div>

          <div id="amount-wrapper">
            <input type="number" id="amount" placeholder="Amount" step="0.01" required />
          </div>

          <div id="date-wrapper">
            <input type="date" id="date" required />
          </div>

          <div id="category-wrapper">
            <select id="category"></select>
          </div>

          <div id="income-source-wrapper">
            <select id="income-source"></select>
          </div>

          <div id="income-repeating-wrapper">
            <label>
              <input type="checkbox" id="income-repeating" /> Recurring Income
            </label>
            <select id="income-frequency" disabled></select>
          </div>

          <button type="submit">Add</button>
        </form>
      </div>
    </div>

    <h3>Transactions</h3>
    <ul id="transactions"></ul>

    <button id="clearBtn">Clear All</button>

    <p id="error" class="error"></p>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: white; padding: 20px; border-radius: 10px; text-align: center;">
      <div>Processing receipt...</div>
      <div>Please wait ⏳</div>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div id="feedback-modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px;">
      <span class="close-feedback-btn"
        style="float: right; cursor: pointer; font-size: 24px;">&times;</span>
      <h3>Send Feedback</h3>
      <form id="feedback-form">
        <select id="feedback-type" required style="width: 100%; padding: 10px; margin: 10px 0;">
          <option value="suggestion">💡 Suggestion</option>
          <option value="bug_report">🐛 Bug Report</option>
          <option value="general">📝 General</option>
        </select>
        <textarea id="feedback-message" placeholder="Your message..." rows="4" required
          style="width: 100%; padding: 10px; margin: 10px 0;"></textarea>
        <button type="submit"
          style="background-color: #1B3A6C; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Send
          Feedback</button>
      </form>
    </div>
  </div>

</body>

<!-- ⭐ SCRIPT MUST BE HERE — ONLY HERE -->
<script src="js/dashboard.js"></script>

</html>
