<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dollar Doodle - Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

  <!-- Header with Logo -->
  <header class="dashboard-header">
    <div class="logo-wrapper">
      <a href="index.html">
        <img src="assets/images/logo-full.png" class="logo" alt="Dollar Doodle Logo">
      </a>
    </div>
  </header>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <div class="top-bar">
      <div id="welcome"></div>
      <button id="logoutBtn">Logout</button>
    </div>

    <div id="balance">Balance: $0</div>

    <!-- Add Expense Form -->
    <h3>Add Expense</h3>
    <form id="add-expense-form">
      <input type="text" id="description" placeholder="Description" />
      <input type="number" id="amount" placeholder="Amount" step="0.01" />
      <select id="category">
        <!-- Categories will be loaded dynamically from DB -->
      </select>
      <button type="submit">Add</button>
    </form>

    <!-- Expenses List -->
    <h3>Expenses</h3>
    <ul id="transactions"></ul>

    <!-- Clear All Button -->
    <button id="clearBtn">Clear All</button>

    <p id="error" class="error"></p>
  </div>

  <script src="js/dashboard.js"></script>
</body>

</html>
